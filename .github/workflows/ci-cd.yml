name: CI-CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  NODE_VERSION: 20

jobs:
  validate-backends:
    name: Validate backend services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: user
            path: User
          - name: product
            path: Product
          - name: cart
            path: Cart
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Syntax check JavaScript files
        working-directory: ${{ matrix.path }}
        run: |
          find . -name "*.js" -not -path "./node_modules/*" -print0 | xargs -0 -n1 node --check

  validate-frontend:
    name: Validate front-end
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        working-directory: front-end
        run: npm ci

      - name: Build front-end
        working-directory: front-end
        env:
          VITE_USER_API_URL: ${{ vars.VITE_USER_API_URL || 'http://localhost:3001' }}
          VITE_PRODUCT_API_URL: ${{ vars.VITE_PRODUCT_API_URL || 'http://localhost:3002' }}
          VITE_CART_API_URL: ${{ vars.VITE_CART_API_URL || 'http://localhost:3003' }}
        run: npm run build

  validate-admin-portal:
    name: Validate admin portal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: admin-portal/package-lock.json

      - name: Install dependencies
        working-directory: admin-portal
        run: npm ci

      - name: Build admin portal
        working-directory: admin-portal
        env:
          VITE_USER_API_URL: ${{ vars.VITE_USER_API_URL || 'http://localhost:3001' }}
          VITE_PRODUCT_API_URL: ${{ vars.VITE_PRODUCT_API_URL || 'http://localhost:3002' }}
        run: npm run build

  publish-images:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    needs:
      - validate-backends
      - validate-frontend
      - validate-admin-portal
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: user
            context: User
            dockerfile: Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/webgame-user
            buildArgs: ""
          - name: product
            context: Product
            dockerfile: Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/webgame-product
            buildArgs: ""
          - name: cart
            context: Cart
            dockerfile: Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/webgame-cart
            buildArgs: ""
          - name: frontend
            context: front-end
            dockerfile: Dockerfile.prod
            image: ghcr.io/${{ github.repository_owner }}/webgame-frontend
            buildArgs: |
              VITE_USER_API_URL=${{ vars.VITE_USER_API_URL || 'http://localhost:3001' }}
              VITE_PRODUCT_API_URL=${{ vars.VITE_PRODUCT_API_URL || 'http://localhost:3002' }}
              VITE_CART_API_URL=${{ vars.VITE_CART_API_URL || 'http://localhost:3003' }}
          - name: admin-portal
            context: admin-portal
            dockerfile: Dockerfile.prod
            image: ghcr.io/${{ github.repository_owner }}/webgame-admin-portal
            buildArgs: |
              VITE_USER_API_URL=${{ vars.VITE_USER_API_URL || 'http://localhost:3001' }}
              VITE_PRODUCT_API_URL=${{ vars.VITE_PRODUCT_API_URL || 'http://localhost:3002' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase registry owner
        id: set-registry
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          file: ./${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: |
             ghcr.io/${{ steps.set-registry.outputs.owner }}/webgame-${{ matrix.name }}:latest
             ghcr.io/${{ steps.set-registry.outputs.owner }}/webgame-${{ matrix.name }}:${{ github.sha }}
          build-args: ${{ matrix.buildArgs }}