version: "3.8"

services:
  user:
    image: ghcr.io/${GHCR_OWNER}/webgame-user:${IMAGE_TAG:-latest}
    ports:
      - "${USER_PORT:-3001}:3001"
    environment:
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_CLUSTER: ${MONGO_CLUSTER}
      MONGO_DBNAME: ${MONGO_DBNAME}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      PORT: 3001

  product:
    image: ghcr.io/${GHCR_OWNER}/webgame-product:${IMAGE_TAG:-latest}
    ports:
      - "${PRODUCT_PORT:-3002}:3002"
    environment:
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_CLUSTER: ${MONGO_CLUSTER}
      MONGO_DBNAME: ${MONGO_DBNAME}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      PORT: 3002

  cart:
    image: ghcr.io/${GHCR_OWNER}/webgame-cart:${IMAGE_TAG:-latest}
    ports:
      - "${CART_PORT:-3003}:3003"
    environment:
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_CLUSTER: ${MONGO_CLUSTER}
      MONGO_DBNAME: ${MONGO_DBNAME}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      PORT: 3003

  front-end:
    image: ghcr.io/${GHCR_OWNER}/webgame-frontend:${IMAGE_TAG:-latest}
    ports:
      - "${FRONTEND_PORT:-80}:80"