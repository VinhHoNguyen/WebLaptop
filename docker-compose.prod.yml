version: "3.8"

services:
  user:
    image: ghcr.io/${GHCR_OWNER}/webgame-user:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${USER_PORT:-3001}:3001"
    environment:
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_CLUSTER: ${MONGO_CLUSTER}
      MONGO_DBNAME: ${MONGO_DBNAME}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      PORT: 3001

  product:
    image: ghcr.io/${GHCR_OWNER}/webgame-product:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${PRODUCT_PORT:-3002}:3002"
    environment:
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_CLUSTER: ${MONGO_CLUSTER}
      MONGO_DBNAME: ${MONGO_DBNAME}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      PORT: 3002


  front-end:
    image: ghcr.io/${GHCR_OWNER}/webgame-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"

  admin-portal:
    image: ghcr.io/${GHCR_OWNER}/webgame-admin-portal:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-5174}:80"