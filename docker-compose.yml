services:
  mysql:
    image: mysql:8.4
    container_name: webgame-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${CHECKOUT_MYSQL_DATABASE:-checkout_db}
      MYSQL_USER: ${CHECKOUT_MYSQL_USER:-checkout_svc}
      MYSQL_PASSWORD: ${CHECKOUT_MYSQL_PASSWORD:-checkout_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./services/checkout/sql/schema.sql:/docker-entrypoint-initdb.d/01-checkout-schema.sql:ro
      - ./services/identity/sql/schema.sql:/docker-entrypoint-initdb.d/02-identity-schema.sql:ro
      - ./services/catalog/sql/schema.sql:/docker-entrypoint-initdb.d/03-product-schema.sql:ro
      - ./services/identity/sql/04-identity-seed.sql:/docker-entrypoint-initdb.d/04-identity-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: webgame-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 8
    networks:
      - app-network

  identity:
    build:
      context: ./services/identity
      dockerfile: Dockerfile
    container_name: webgame-identity
    restart: unless-stopped
    expose:
      - "3001"
    ports:
      - "${USER_PORT:-3001}:3001"
    environment:
      SERVICE_NAME: identity-service
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:5174,http://localhost:8080}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      GATEWAY_SECRET: ${GATEWAY_SECRET:-gateway-shared-secret}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-internal-shared-secret}
      CHECKOUT_SERVICE_URL: http://checkout:3004
      REQUEST_TIMEOUT_MS: 5000
      CHECKOUT_RETRY_COUNT: 2
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: identity_db
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
  catalog:
    build:
      context: ./services/catalog
      dockerfile: Dockerfile
    container_name: webgame-catalog
    restart: unless-stopped
    expose:
      - "3002"
    ports:
      - "${PRODUCT_PORT:-3002}:3002"
    volumes:
      - ./products.json:/app/products.json:ro
    environment:
      SERVICE_NAME: catalog-service
      PRODUCT_PORT: 3002
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:5174,http://localhost:8080}
      PRODUCTS_JSON_PATH: /app/products.json
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-internal-shared-secret}
      IDENTITY_SERVICE_URL: http://identity:3001
      REQUEST_TIMEOUT_MS: 5000
      USER_RETRY_COUNT: 2
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: product_db
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
  checkout:
    build:
      context: ./services/checkout
      dockerfile: Dockerfile
    container_name: webgame-checkout
    restart: unless-stopped
    expose:
      - "3004"
    ports:
      - "${CHECKOUT_PORT:-3004}:3004"
    environment:
      SERVICE_NAME: checkout-service
      CHECKOUT_PORT: 3004
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:5174,http://localhost:8080}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      GATEWAY_SECRET: ${GATEWAY_SECRET:-gateway-shared-secret}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-internal-shared-secret}
      IDENTITY_SERVICE_URL: http://identity:3001
      USER_RETRY_COUNT: 2
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${CHECKOUT_MYSQL_USER:-checkout_svc}
      MYSQL_PASSWORD: ${CHECKOUT_MYSQL_PASSWORD:-checkout_password}
      MYSQL_DATABASE: ${CHECKOUT_MYSQL_DATABASE:-checkout_db}
      PRODUCT_SERVICE_URL: http://catalog:3002
      REQUEST_TIMEOUT_MS: 5000
      PRODUCT_RETRY_COUNT: 2
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      ORDER_EXCHANGE: order.events
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY}
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE:-MOMO}
      MOMO_HOSTNAME: ${MOMO_HOSTNAME:-test-payment.momo.vn}
      MOMO_REDIRECT_URL: ${MOMO_REDIRECT_URL:-http://localhost:5173/momo}
      MOMO_IPN_URL: ${MOMO_IPN_URL:-https://webhook.site/replace-with-your-ipn}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      mysql:
        condition: service_healthy
      catalog:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: webgame-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      SERVICE_NAME: api-gateway
      GATEWAY_PORT: 8080
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      GATEWAY_SECRET: ${GATEWAY_SECRET:-gateway-shared-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:5174}
      IDENTITY_SERVICE_URL: http://identity:3001
      CATALOG_SERVICE_URL: http://catalog:3002
      CHECKOUT_SERVICE_URL: http://checkout:3004
    depends_on:
      - identity
      - catalog
      - checkout
    networks:
      - app-network

  notification-worker:
    build:
      context: ./services/notification-worker
      dockerfile: Dockerfile
    container_name: webgame-notification-worker
    restart: unless-stopped
    environment:
      SERVICE_NAME: notification-worker
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      ORDER_EXCHANGE: order.events
      QUEUE_NAME: order.created.notifications
      MAX_RETRY: 3
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  front-end:
    build:
      context: ./front-end
      dockerfile: Dockerfile.prod
      args:
        VITE_USER_API_URL: ${VITE_USER_API_URL:-http://localhost:8080/api/identity}
        VITE_PRODUCT_API_URL: ${VITE_PRODUCT_API_URL:-http://localhost:8080/api/catalog}
        VITE_CHECKOUT_API_URL: ${VITE_CHECKOUT_API_URL:-http://localhost:8080/api/checkout}
        VITE_CART_API_URL: ${VITE_CART_API_URL:-http://localhost:8080/api/checkout}
        VITE_PAYMENT_API_URL: ${VITE_PAYMENT_API_URL:-http://localhost:8080/api/checkout}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:3004}
        VITE_CHAT_API_URL: ${VITE_CHAT_API_URL:-http://localhost:3005}
    container_name: webgame-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - gateway
    networks:
      - app-network
  admin-portal:
    build:
      context: ./admin-portal
      dockerfile: Dockerfile.prod
      args:
        VITE_USER_API_URL: ${VITE_USER_API_URL:-http://localhost:8080/api/identity}
        VITE_PRODUCT_API_URL: ${VITE_PRODUCT_API_URL:-http://localhost:8080/api/catalog}
        VITE_CHECKOUT_API_URL: ${VITE_CHECKOUT_API_URL:-http://localhost:8080/api/checkout}
    container_name: webgame-admin-portal
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-5174}:80"
    depends_on:
      - gateway
    networks:
      - app-network
  n8n:
    image: n8nio/n8n
    container_name: webgame-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_CORS_ENABLE=true
      - N8N_CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5174
    networks:
      - app-network
  mongodb:
    image: mongo:7
    container_name: webgame-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
networks:
  app-network:
    driver: bridge
volumes:
  mysql_data:
  n8n_data:
  rabbitmq_data:
  mongodb_data:
