version: '3'
services:
  user:
    image: user
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      PORT: 3001
    command: node server.js

  cart:
    image: cart
    ports:
      - "3003:3003"
    env_file:
      - .env
    environment:
      PORT: 3003
    command: node server.js  

  product:
    image: product
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      PORT: 3002
    command: node server.js
    
