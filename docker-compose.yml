services:
  mysql:
    image: mysql:8.4
    container_name: webgame-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${CHECKOUT_MYSQL_DATABASE:-checkout_db}
      MYSQL_USER: ${CHECKOUT_MYSQL_USER:-checkout_svc}
      MYSQL_PASSWORD: ${CHECKOUT_MYSQL_PASSWORD:-checkout_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./services/checkout/sql/schema.sql:/docker-entrypoint-initdb.d/01-checkout-schema.sql:ro
      - ./services/identity/sql/schema.sql:/docker-entrypoint-initdb.d/02-identity-schema.sql:ro
      - ./services/catalog/sql/schema.sql:/docker-entrypoint-initdb.d/03-product-schema.sql:ro
      - ./services/identity/sql/04-identity-seed.sql:/docker-entrypoint-initdb.d/04-identity-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  identity:
    build:
      context: ./services/identity
      dockerfile: Dockerfile
    container_name: webgame-identity
    restart: unless-stopped
    ports:
      - "${USER_PORT:-3001}:3001"
    environment:
      SERVICE_NAME: identity-service
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:5174}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: identity_db
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
  catalog:
    build:
      context: ./services/catalog
      dockerfile: Dockerfile
    container_name: webgame-catalog
    restart: unless-stopped
    ports:
      - "${PRODUCT_PORT:-3002}:3002"
    volumes:
      - ./products.json:/app/products.json:ro
    environment:
      SERVICE_NAME: catalog-service
      PRODUCT_PORT: 3002
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:5174}
      PRODUCTS_JSON_PATH: /app/products.json
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: product_db
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
  checkout:
    build:
      context: ./services/checkout
      dockerfile: Dockerfile
    container_name: webgame-checkout
    restart: unless-stopped
    ports:
      - "${CHECKOUT_PORT:-3004}:3004"
    environment:
      SERVICE_NAME: checkout-service
      CHECKOUT_PORT: 3004
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:5174}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${CHECKOUT_MYSQL_USER:-checkout_svc}
      MYSQL_PASSWORD: ${CHECKOUT_MYSQL_PASSWORD:-checkout_password}
      MYSQL_DATABASE: ${CHECKOUT_MYSQL_DATABASE:-checkout_db}
      PRODUCT_SERVICE_URL: http://catalog:3002
      REQUEST_TIMEOUT_MS: 5000
      PRODUCT_RETRY_COUNT: 2
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY}
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE:-MOMO}
      MOMO_HOSTNAME: ${MOMO_HOSTNAME:-test-payment.momo.vn}
      MOMO_REDIRECT_URL: ${MOMO_REDIRECT_URL:-http://localhost:5173/momo}
      MOMO_IPN_URL: ${MOMO_IPN_URL:-https://webhook.site/replace-with-your-ipn}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      mysql:
        condition: service_healthy
      catalog:
        condition: service_started
    networks:
      - app-network
  front-end:
    build:
      context: ./front-end
      dockerfile: Dockerfile.prod
      args:
        VITE_USER_API_URL: ${VITE_USER_API_URL:-http://localhost:3001}
        VITE_PRODUCT_API_URL: ${VITE_PRODUCT_API_URL:-http://localhost:3002}
        VITE_CHECKOUT_API_URL: ${VITE_CHECKOUT_API_URL:-http://localhost:3004}
        VITE_CART_API_URL: ${VITE_CART_API_URL:-http://localhost:3004}
        VITE_PAYMENT_API_URL: ${VITE_PAYMENT_API_URL:-http://localhost:3004}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:3004}
        VITE_CHAT_API_URL: ${VITE_CHAT_API_URL:-http://localhost:3005}
    container_name: webgame-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - identity
      - catalog
      - checkout
    networks:
      - app-network
  admin-portal:
    build:
      context: ./admin-portal
      dockerfile: Dockerfile.prod
      args:
        VITE_USER_API_URL: ${VITE_USER_API_URL:-http://localhost:3001}
        VITE_PRODUCT_API_URL: ${VITE_PRODUCT_API_URL:-http://localhost:3002}
        VITE_CHECKOUT_API_URL: ${VITE_CHECKOUT_API_URL:-http://localhost:3004}
    container_name: webgame-admin-portal
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-5174}:80"
    depends_on:
      - identity
      - catalog
    networks:
      - app-network
  n8n:
    image: n8nio/n8n
    container_name: webgame-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_CORS_ENABLE=true
      - N8N_CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5174
    networks:
      - app-network
  mongodb:
    image: mongo:7
    container_name: webgame-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
  chat-service:
    build:
      context: ./services/chat
      dockerfile: Dockerfile
    container_name: webgame-chat
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      MONGODB_URI: mongodb://mongodb:27017/chat_db
      CORS_ORIGIN: http://localhost:5173,http://localhost:5174
    depends_on:
      - mongodb
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
volumes:
  mysql_data:
  n8n_data:  
  mongodb_data: