apiVersion: v1
kind: Secret
metadata:
  name: cart-secrets
  namespace: default
  labels:
    app: cart
type: Opaque
stringData:
  # Base64 encode: echo -n "your_mongo_connection_string" | base64
  mongo-uri: "mongodb+srv://username:password@cluster.mongodb.net/cart_db?retryWrites=true&w=majority"
  access-token: "your_jwt_secret_key_here"
